<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Claude RTL Fix</title>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --card: #222222;
    --border: #333;
    --accent: #cc785c;
    --accent2: #e8a87c;
    --text: #f0ede8;
    --muted: #888;
    --green: #4caf7d;
    --radius: 12px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    width: 320px;
    background: var(--bg);
    color: var(--text);
    font-family: "Noto Naskh Arabic", "Segoe UI", Tahoma, sans-serif;
    font-size: 14px;
    direction: rtl;
    border-radius: 16px;
    overflow: hidden;
  }

  /* Header */
  .header {
    background: linear-gradient(135deg, #1a1a1a 0%, #2a1f1a 100%);
    padding: 18px 20px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .logo {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }
  .header-text h1 {
    font-size: 15px; font-weight: 700; color: var(--text);
    line-height: 1.2;
  }
  .header-text p {
    font-size: 11px; color: var(--muted); margin-top: 2px;
  }

  /* Status badge */
  .status-bar {
    padding: 10px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--green);
    box-shadow: 0 0 6px var(--green);
    flex-shrink: 0;
    margin-left: 8px;
  }
  .status-dot.off { background: #555; box-shadow: none; }
  .status-label { font-size: 12px; color: var(--muted); }
  .status-text { font-size: 12px; color: var(--text); font-weight: 600; }

  /* Toggle */
  .toggle-row {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--card);
    border-bottom: 1px solid var(--border);
  }
  .toggle-label {
    font-size: 14px; font-weight: 600;
  }
  .toggle {
    position: relative;
    width: 46px; height: 26px;
    cursor: pointer;
  }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider {
    position: absolute; inset: 0;
    background: #333;
    border-radius: 26px;
    transition: .3s;
  }
  .slider::before {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
    right: 3px; top: 3px;
    background: #888;
    border-radius: 50%;
    transition: .3s;
  }
  input:checked + .slider { background: var(--accent); }
  input:checked + .slider::before {
    transform: translateX(-20px);
    background: white;
  }

  /* Stats */
  .stats {
    padding: 14px 20px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    border-bottom: 1px solid var(--border);
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    text-align: center;
  }
  .stat-num {
    font-size: 22px; font-weight: 700;
    color: var(--accent2);
    line-height: 1;
  }
  .stat-lbl {
    font-size: 11px; color: var(--muted);
    margin-top: 4px;
  }

  /* Rescan button */
  .actions { padding: 14px 20px; border-bottom: 1px solid var(--border); }
  .btn {
    width: 100%;
    padding: 11px 16px;
    border: none;
    border-radius: var(--radius);
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    transition: .2s;
    font-weight: 600;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
  }
  .btn-primary:hover { opacity: .88; }
  .btn-primary:active { transform: scale(.98); }

  /* Features list */
  .features {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
  }
  .features-title {
    font-size: 11px;
    color: var(--muted);
    margin-bottom: 10px;
    text-transform: uppercase;
    letter-spacing: .5px;
  }
  .feature {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-size: 13px;
    color: var(--text);
  }
  .feature-icon {
    width: 22px; height: 22px;
    border-radius: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
  }

  /* Footer */
  .footer {
    padding: 10px 20px;
    text-align: center;
    font-size: 11px;
    color: var(--muted);
  }
  .footer a { color: var(--accent2); text-decoration: none; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">🌙</div>
  <div class="header-text">
    <h1>إصلاح RTL لكلود</h1>
    <p>اكتشاف ذكي للغة العربية</p>
  </div>
</div>

<div class="status-bar">
  <div style="display:flex;align-items:center;gap:8px;">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">جارٍ التحميل...</span>
  </div>
  <span class="status-label" id="pageLabel"></span>
</div>

<div class="toggle-row">
  <span class="toggle-label">تفعيل الإضافة</span>
  <label class="toggle">
    <input type="checkbox" id="enableToggle" checked />
    <span class="slider"></span>
  </label>
</div>

<div class="stats">
  <div class="stat-card">
    <div class="stat-num" id="fixedCount">—</div>
    <div class="stat-lbl">عناصر تم إصلاحها</div>
  </div>
  <div class="stat-card">
    <div class="stat-num" id="pageCount">—</div>
    <div class="stat-lbl">صفحات معالجة</div>
  </div>
</div>

<div class="actions">
  <button class="btn btn-primary" id="rescanBtn">🔄 إعادة المسح الآن</button>
</div>

<div class="features">
  <div class="features-title">الميزات المفعّلة</div>
  <div class="feature"><div class="feature-icon">🔤</div> اكتشاف تلقائي للعربية</div>
  <div class="feature"><div class="feature-icon">↔️</div> دعم النصوص المختلطة</div>
  <div class="feature"><div class="feature-icon">📋</div> تحسين القوائم والفقرات</div>
  <div class="feature"><div class="feature-icon">🖼️</div> يعمل مع صفحات Artifacts</div>
  <div class="feature"><div class="feature-icon">⚡</div> تطبيق فوري بلا إعداد</div>
</div>

<div class="footer">
  Claude Arabic RTL Fix v1.0 &nbsp;·&nbsp;
  <a href="#" id="privacyLink">سياسة الخصوصية</a>
</div>

<script src="popup.js"></script>
</body>
</html>
